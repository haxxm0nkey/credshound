name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

      - name: Build Linux
        run: go build ./cmd/credshound

      - name: Build Windows
        run: GOOS=windows GOARCH=amd64 go build ./cmd/credshound

      - name: Build macOS
        run: GOOS=darwin GOARCH=arm64 go build ./cmd/credshound
